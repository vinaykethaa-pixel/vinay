{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#007bff">
    <title>Enhanced Liver Image Segmentation</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Roboto Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Static CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>
    <!-- Particle Background -->
    <canvas id="particles"></canvas>

    <!-- Original 3D Animated Leaf -->
    <div class="leaf-container">
        <div class="leaf">
            <div class="front"><i class="fas fa-leaf"></i></div>
            <div class="back"><i class="fas fa-leaf"></i></div>
        </div>
    </div>

    <!-- 3D Animated Needle-like Leaf -->
    <div class="needle-container">
        <div class="needle">
            <div class="front"><i class="fas fa-leaf"></i></div>
            <div class="back"><i class="fas fa-leaf"></i></div>
        </div>
    </div>

    <!-- 3D Animated Lobed Leaf -->
    <div class="lobed-container">
        <div class="lobed">
            <div class="front"></div>
            <div class="back"></div>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo"><i class="fas fa-leaf mr-2"></i>Liver Image Segmentation</a>
            <div class="menu-toggle" id="mobileMenu">☰</div>
            <div class="nav-menu" id="navMenu">
                <a href="adminHome" class="nav-btn"><i class="fas fa-home mr-1"></i>Home</a>
                <a href="userList" class="nav-btn"><i class="fas fa-user mr-1"></i>UserDetails</a>
                 <a href="log" class="nav-btn"><i class="fas fa-sign-out-alt mr-1"></i>LogOut</a>

            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero-section">
        <div class="hero-content">
            <h1>Welcome to Admin Dashboard</h1>
            <p>Manage Liver Segmentation Analysis with Advanced Deep Learning</p>
        </div>
    </section>

    <!-- Main Content -->
   

    <!-- Footer -->
    <footer class="footer-gradient">
        <div class="footer-container">
            <p>© 2025 LiverSegmentation. All rights reserved.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // Mobile Menu Toggle
        const mobileMenu = document.getElementById('mobileMenu');
        const navMenu = document.getElementById('navMenu');
        mobileMenu.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        // Active Link Highlight
        const navLinks = document.querySelectorAll('.nav-btn');
        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href === window.location.pathname || (window.location.pathname === '/' && href === 'adminHome')) {
                link.classList.add('active');
            }
        });

        // Particle Animation
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        const numberOfParticles = 100;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 5 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.color = ['#F1C40F', '#27AE60', '#E74C3C', '#3498DB'][Math.floor(Math.random() * 4)];
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.05;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                if (particlesArray[i].size <= 0.2) {
                    particlesArray.splice(i, 1);
                    i--;
                    particlesArray.push(new Particle());
                }
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // Resize Canvas
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });
    </script>
</body>

</html>
