<style>
    /* Hero Section */
    .hero-section {
        padding: 60px 20px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.5);
        min-height: 400px;
        position: relative;
        overflow: hidden;
    }

    .hero-section h1 {
        font-size: 3rem;
        font-weight: bold;
        color: #ffffff;
        margin-bottom: 30px;
        text-transform: uppercase;
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 1.5px;
        animation: fadeIn 1s ease-in;
    }

    .hero-section h2 {
        font-size: 2.5rem;
        font-weight: bold;
        color: #ffffff;
        margin-bottom: 30px;
        text-transform: uppercase;
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 1.5px;
    }

    .hero-section h3 {
        font-size: 1.8rem;
        color: #E94560;
        margin: 20px 0 10px;
        font-weight: 600;
        transition: color 0.3s ease;
    }

    .hero-section h3:hover {
        color: #00FFF5;
    }

    .hero-section ul {
        list-style: none;
        padding: 0;
        margin: 10px 0 30px;
        max-width: 600px;
        background: rgba(22, 33, 62, 0.95);
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .hero-section ul:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    .hero-section li {
        font-size: 1.1rem;
        color: #ffffff;
        margin: 8px 0;
        display: flex;
        justify-content: space-between;
        padding: 5px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .hero-section li:last-child {
        border-bottom: none;
    }

    .hero-section li::before {
        content: "📊";
        margin-right: 10px;
        color: #00FFF5;
    }

    .hero-section li span {
        color: #FBC02D;
        font-weight: bold;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (min-width: 768px) {
        .hero-section h1 {
            font-size: 4rem;
        }

        .hero-section h2 {
            font-size: 3.5rem;
        }

        .hero-section h3 {
            font-size: 2rem;
        }

        .hero-section ul {
            max-width: 800px;
            padding: 20px;
        }

        .hero-section li {
            font-size: 1.2rem;
        }
    }

    @media (max-width: 600px) {
        .hero-section {
            padding: 40px 15px;
        }

        .hero-section h1 {
            font-size: 2.5rem;
        }

        .hero-section h2 {
            font-size: 2rem;
        }

        .hero-section h3 {
            font-size: 1.5rem;
        }

        .hero-section ul {
            max-width: 100%;
            padding: 10px;
        }

        .hero-section li {
            font-size: 1rem;
            flex-direction: column;
            align-items: flex-start;
        }
    }
</style>
{% load static %}

    <!-- JavaScript -->
    <script>
        // Mobile Menu Toggle
        const mobileMenu = document.getElementById('mobileMenu');
        const navMenu = document.getElementById('navMenu');
        mobileMenu.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            const isExpanded = navMenu.classList.contains('active');
            mobileMenu.setAttribute('aria-expanded', isExpanded);
        });

        // Active Link Highlight
        const navLinks = document.querySelectorAll('.nav-btn');
        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href === window.location.pathname || (window.location.pathname === '/' && href === 'userHome')) {
                link.classList.add('active');
            }
        });

        // Particle Animation
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        const numberOfParticles = 100;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 5 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.color = ['#F1C40F', '#27AE60', '#E74C3C', '#3498DB'][Math.floor(Math.random() * 4)];
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.05;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                if (particlesArray[i].size <= 0.2) {
                    particlesArray.splice(i, 1);
                    i--;
                    particlesArray.push(new Particle());
                }
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // Resize Canvas
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });
    </script>
